<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>hello-wasm example</title>
    <style>
        /* General Layout using Flexbox */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h2 { color: #333; }

        /* The Table Styling */
        table {
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        td {
            width: 100px;
            height: 100px;
            border: 4px solid #333;
            text-align: center;
            vertical-align: middle;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        td:hover {
            background-color: #eee;
        }

        /* Removing outer borders for a "cleaner" Tic-Tac-Toe look */
        tr:first-child td { border-top: none; }
        tr:last-child td { border-bottom: none; }
        td:first-child { border-left: none; }
        td:last-child { border-right: none; }

        /* Chat Widget Styles */
        .chat-container {
            width: 312px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        #chat-box {
            height: 150px;
            padding: 10px;
            overflow-y: auto;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .chat-input-area {
            display: flex;
        }

        input {
            flex-grow: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover { background: #0056b3; }
    </style>
  </head>

    <script type="module">
      import init, { Engine } from "./web_client.js";

      // Connect to the Rust server
      const socket = new WebSocket('ws://192.168.20.108:11000');
      function sendBytes(bytes) {
  	socket.send(bytes);
      }
      
      // Connection opened
      //socket.onopen = (event) => {
      //};
      
      // Handle errors or closing
      socket.onclose = () => console.log('Server connection closed');
      socket.onerror = (error) => console.error('WebSocket Error:', error);

      init().then(() => {
        const engine = new Engine(sendBytes);
        socket.onmessage = (event) => {
          console.log('Message from server:', event.data);
          engine.recv_server_msg(event.data);
        };

	engine.set_on_recv_chat_msg((from, message) => {
          const chatBox = document.getElementById('chat-box');
          const div = document.createElement('div');
          div.textContent = from + ": " + message;
          chatBox.appendChild(div);
          chatBox.scrollTop = chatBox.scrollHeight;
	});

	function heartbeat() {
	  engine.send_heartbeat();
	  setTimeout(heartbeat, 10000);
	}

        function sendMsg() {
          const input = document.getElementById('message-input');
          const chatBox = document.getElementById('chat-box');
          const message = input.value.trim();
          if (message !== "") {
              input.value = "";
              engine.send_chat_msg("abdullah", message);
          }
        }

	function onFailure() {
	  console.log('On login failure')
	}

	function onSuccess() {
	  console.log('On login success')
	  heartbeat();

          const sendButton = document.getElementById('send-button');
          sendButton.addEventListener('click', sendMsg);

          const chatInput = document.getElementById('message-input');
          chatInput.addEventListener('keydown', (event) => {
              if (event.key === 'Enter') {
                // Prevent the default behavior (like submitting a form)
                event.preventDefault(); 
                sendMsg();
              }
          });
        }

	engine.send_login_req("ben", onSuccess, onFailure);
      });
    </script>
  </body>
